# RAFD | رفد - Supabase Local & Remote Config
# Updated for latest Supabase CLI (v2+) - removed deprecated keys
# Docs: https://supabase.com/docs/guides/local-development/cli/getting-started
# Validated against CLI error: storage.port, storage.import_path, auth.port, auth.enable_confirmations invalid

project_id = "rafd-app"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:3000", "https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = true

[auth.external.google]
enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
